<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Curriculum Vitae - Portfolio API</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="icon" type="image/png" href="https://static1.smartbear.co/swagger/media/assets/images/swagger_fav.png">
</head>
<body>
    <header class="topbar">
        <div class="wrapper">
            <a href="../index.html" class="logo">
                <img src="https://static1.smartbear.co/swagger/media/assets/images/swagger_logo.svg" alt="Swagger Logo">

    <main class="wrapper">
        <div class="info-header">
            <h1 class="title">GET <span class="opblock-summary-path" style="font-size: 2.5rem;">/cv</span></h1>

            <a href="../index.html" style="color: var(--swagger-blue); text-decoration: none;">&larr; Retour à l'index</a>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Mon CV</h2>
                    <a href="../assets/mon_cv.pdf" download class="btn-execute" style="background-color: var(--swagger-green);">TÉLÉCHARGER LE PDF</a>

            </div>
        </section>
    </main>

    <footer class="wrapper">
